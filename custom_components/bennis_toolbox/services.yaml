# Services aller Toolbox-Module — Namensschema: <module_id>_<action>.
# Domain in der HA-UI: bennis_toolbox.

# --- Benni Context -----------------------------------------------------------

benni_context_set_bio_state:
  name: Benni Context — Set bio state
  description: Manually overrides the persistent bio state for every loaded
    Benni Context instance.
  fields:
    state:
      required: true
      selector:
        select:
          options:
            - sleep
            - waking
            - awake

benni_context_mark_sleep:
  name: Benni Context — Mark as sleeping
  description: Shortcut for set_bio_state with state=sleep.

benni_context_mark_awake:
  name: Benni Context — Mark as awake
  description: Shortcut for set_bio_state with state=awake.

# --- Benni Media Context -----------------------------------------------------

benni_media_context_force_recalculate:
  name: Benni Media Context — Force recalculate
  description: Re-runs the decision pipeline on every active Media-Context instance.

benni_media_context_set_manual_nudge:
  name: Benni Media Context — Set manual nudge
  description: Manually overrides the subcontext until cleared.
  fields:
    subcontext:
      required: true
      selector:
        text:

benni_media_context_clear_manual_nudge:
  name: Benni Media Context — Clear manual nudge

benni_media_context_start_radio:
  name: Benni Media Context — Start radio event
  description: Fires bennis_toolbox_benni_media_context_start_radio on the bus.
  fields:
    station:
      required: false
      selector:
        text:

benni_media_context_stop_media:
  name: Benni Media Context — Stop media event
  description: Fires bennis_toolbox_benni_media_context_stop_media on the bus.

# --- Plug Policy Engine ------------------------------------------------------

plug_policy_engine_force_evaluate:
  name: Plug Policy Engine — Force evaluate
  description: Re-runs policy evaluation on every active Plug Policy Engine instance.

plug_policy_engine_apply_policy_now:
  name: Plug Policy Engine — Apply policy now
  description: Applies the current policy decision immediately. If device_id is omitted,
    all configured devices are evaluated.
  fields:
    device_id:
      required: false
      selector:
        text:

plug_policy_engine_suspend_device_policy:
  name: Plug Policy Engine — Suspend device policy
  description: Suspends policy control for one configured device.
  fields:
    device_id:
      required: true
      selector:
        text:

plug_policy_engine_resume_device_policy:
  name: Plug Policy Engine — Resume device policy
  description: Resumes policy control for one configured device.
  fields:
    device_id:
      required: true
      selector:
        text:

plug_policy_engine_set_manual_recently_on:
  name: Plug Policy Engine — Mark manual recently on
  description: Marks one device as manually turned on so cooldown protection can apply.
  fields:
    device_id:
      required: true
      selector:
        text:

# --- Notification Router -----------------------------------------------------

notification_router_route:
  name: Notification Router — Route event
  description: Routes a single event through every active Notification-Router
    instance. Fires bennis_toolbox_notification_router_routed on the bus and
    drives configured push/light/media targets.
  fields:
    event_type:
      required: true
      selector:
        select:
          options:
            - doorbell
            - security
            - appliance_done
            - device_health
            - lock
            - climate
            - media
            - info
    severity:
      required: false
      default: normal
      selector:
        select:
          options:
            - info
            - normal
            - urgent
            - critical
    title:
      required: false
      default: ""
      selector:
        text:
    message:
      required: false
      default: ""
      selector:
        text:
    payload:
      required: false
      default: {}
      selector:
        object:
    dedupe_key:
      required: false
      selector:
        text:

notification_router_clear:
  name: Notification Router — Clear dedupe / cooldowns
  description: Clears the entire dedupe and cooldown caches, or just one key.
  fields:
    dedupe_key:
      required: false
      selector:
        text:

notification_router_set_dnd:
  name: Notification Router — Set DND window
  description: Enables Do-Not-Disturb for `duration` seconds. 0 clears DND.
  fields:
    duration:
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 86400
          step: 1
          mode: box

# --- Cover Policy ------------------------------------------------------------

cover_policy_apply_now:
  name: Cover Policy — Apply now
  description: Evaluates and applies the current cover target if all policy gates allow it.
  fields:
    entry_id:
      required: false
      selector:
        text:

cover_policy_set_manual_override:
  name: Cover Policy — Set manual override
  description: Blocks normal policy apply for the configured duration.
  fields:
    entry_id:
      required: false
      selector:
        text:
    duration:
      required: false
      selector:
        number:
          min: 0
          max: 86400
          step: 1
          mode: box

cover_policy_clear_manual_override:
  name: Cover Policy — Clear manual override
  fields:
    entry_id:
      required: false
      selector:
        text:

cover_policy_set_position_profile:
  name: Cover Policy — Set position profile
  description: Updates one or more target positions. Values are percentages from 0 to 100.
  fields:
    entry_id:
      required: false
      selector:
        text:
    profile:
      required: true
      selector:
        object:
